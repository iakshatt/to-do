<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Advanced To-Do App</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #0f172a, #4c1d95, #1e293b);
      overflow: hidden;
      padding: 20px;
    }

    .bg-animation {
      position: absolute;
      width: 100%;
      height: 100%;
      overflow: hidden;
      z-index: 0;
    }

    .circle {
      position: absolute;
      border-radius: 50%;
      background: rgba(255,255,255,0.08);
      animation: float 10s infinite linear;
    }

    .circle:nth-child(1) {
      width: 200px;
      height: 200px;
      top: 10%;
      left: 10%;
    }

    .circle:nth-child(2) {
      width: 300px;
      height: 300px;
      bottom: 5%;
      right: 10%;
      animation-duration: 14s;
    }

    .circle:nth-child(3) {
      width: 150px;
      height: 150px;
      top: 50%;
      left: 60%;
      animation-duration: 8s;
    }

    @keyframes float {
      0% {
        transform: translateY(0px) rotate(0deg);
      }
      50% {
        transform: translateY(-20px) rotate(180deg);
      }
      100% {
        transform: translateY(0px) rotate(360deg);
      }
    }

    .container {
      position: relative;
      z-index: 2;
      width: 100%;
      max-width: 950px;
      min-height: 650px;
      background: rgba(255,255,255,0.1);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 30px;
      overflow: hidden;
      display: grid;
      grid-template-columns: 320px 1fr;
      box-shadow: 0 25px 45px rgba(0,0,0,0.3);
      animation: fadeIn 1s ease;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: scale(0.9);
      }
      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    .sidebar {
      padding: 35px;
      background: rgba(255,255,255,0.05);
      border-right: 1px solid rgba(255,255,255,0.1);
    }

    .logo {
      font-size: 2rem;
      font-weight: 700;
      color: white;
      margin-bottom: 40px;
    }

    .stats {
      display: grid;
      gap: 20px;
    }

    .card {
      background: rgba(255,255,255,0.1);
      border-radius: 20px;
      padding: 25px;
      color: white;
      transition: 0.4s;
      border: 1px solid rgba(255,255,255,0.1);
    }

    .card:hover {
      transform: translateY(-5px) scale(1.03);
      background: rgba(255,255,255,0.15);
    }

    .card h2 {
      font-size: 2.5rem;
      margin-top: 10px;
    }

    .filters {
      margin-top: 40px;
    }

    .filters h3 {
      color: white;
      margin-bottom: 20px;
    }

    .filter-btn {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 14px;
      margin-bottom: 12px;
      background: rgba(255,255,255,0.08);
      color: white;
      cursor: pointer;
      transition: 0.3s;
      font-size: 1rem;
    }

    .filter-btn:hover,
    .filter-btn.active {
      background: white;
      color: #111827;
      transform: scale(1.04);
    }

    .main {
      padding: 35px;
      overflow-y: auto;
    }

    .top-bar {
      display: flex;
      gap: 15px;
      margin-bottom: 25px;
    }

    .search-box,
    .priority-select,
    .task-input {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 16px;
      padding: 16px;
      color: white;
      outline: none;
      font-size: 1rem;
    }

    .search-box,
    .task-input {
      flex: 1;
    }

    .priority-select option {
      color: black;
    }

    .add-section {
      display: flex;
      gap: 15px;
      margin-bottom: 30px;
    }

    .add-btn {
      padding: 16px 28px;
      border: none;
      border-radius: 16px;
      background: linear-gradient(135deg, #ec4899, #8b5cf6);
      color: white;
      font-weight: 600;
      cursor: pointer;
      transition: 0.3s;
      box-shadow: 0 10px 20px rgba(0,0,0,0.2);
    }

    .add-btn:hover {
      transform: translateY(-3px) scale(1.05);
    }

    .task-list {
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .task {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 22px;
      padding: 20px;
      color: white;
      display: flex;
      justify-content: space-between;
      align-items: center;
      animation: slideUp 0.4s ease;
      transition: 0.3s;
    }

    .task:hover {
      transform: translateY(-4px) scale(1.01);
      background: rgba(255,255,255,0.12);
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .task-left {
      display: flex;
      align-items: center;
      gap: 18px;
    }

    .check-btn {
      width: 26px;
      height: 26px;
      border-radius: 50%;
      border: 2px solid white;
      cursor: pointer;
      transition: 0.3s;
    }

    .task.completed .check-btn {
      background: #22c55e;
      border-color: #22c55e;
    }

    .task.completed .task-text {
      text-decoration: line-through;
      opacity: 0.6;
    }

    .task-info {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .task-tags {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .tag {
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 0.8rem;
    }

    .high {
      background: rgba(239,68,68,0.2);
      color: #fca5a5;
    }

    .medium {
      background: rgba(250,204,21,0.2);
      color: #fde68a;
    }

    .low {
      background: rgba(34,197,94,0.2);
      color: #86efac;
    }

    .delete-btn {
      border: none;
      background: rgba(239,68,68,0.15);
      color: #fca5a5;
      padding: 12px;
      border-radius: 14px;
      cursor: pointer;
      transition: 0.3s;
      font-size: 1rem;
    }

    .delete-btn:hover {
      transform: rotate(10deg) scale(1.1);
      background: rgba(239,68,68,0.3);
    }

    .clear-btn {
      margin-top: 25px;
      width: 100%;
      padding: 15px;
      border: none;
      border-radius: 16px;
      background: rgba(239,68,68,0.2);
      color: #fecaca;
      cursor: pointer;
      transition: 0.3s;
      font-size: 1rem;
    }

    .clear-btn:hover {
      background: rgba(239,68,68,0.3);
      transform: scale(1.02);
    }

    @media(max-width: 850px) {
      .container {
        grid-template-columns: 1fr;
      }

      .sidebar {
        border-right: none;
        border-bottom: 1px solid rgba(255,255,255,0.1);
      }
    }
  </style>
</head>
<body>

  <div class="bg-animation">
    <div class="circle"></div>
    <div class="circle"></div>
    <div class="circle"></div>
  </div>

  <div class="container">

    <div class="sidebar">
      <div class="logo">✨ TaskFlow</div>

      <div class="stats">
        <div class="card">
          <p>Completed Tasks</p>
          <h2 id="completedCount">0</h2>
        </div>

        <div class="card">
          <p>Pending Tasks</p>
          <h2 id="pendingCount">0</h2>
        </div>
      </div>

      <div class="filters">
        <h3>Filters</h3>

        <button class="filter-btn active" data-filter="all">All Tasks</button>
        <button class="filter-btn" data-filter="pending">Pending</button>
        <button class="filter-btn" data-filter="completed">Completed</button>
      </div>
    </div>

    <div class="main">

      <div class="top-bar">
        <input type="text" class="search-box" id="search" placeholder="🔍 Search tasks...">

        <select class="priority-select" id="priority">
          <option value="High">High</option>
          <option value="Medium">Medium</option>
          <option value="Low">Low</option>
        </select>
      </div>

      <div class="add-section">
        <input type="text" class="task-input" id="taskInput" placeholder="Add a new task...">

        <button class="add-btn" id="addBtn">+ Add Task</button>
      </div>

      <div class="task-list" id="taskList"></div>

      <button class="clear-btn" id="clearBtn">Clear Completed Tasks</button>

    </div>
  </div>

  <script>
    const taskInput = document.getElementById('taskInput');
    const addBtn = document.getElementById('addBtn');
    const taskList = document.getElementById('taskList');
    const completedCount = document.getElementById('completedCount');
    const pendingCount = document.getElementById('pendingCount');
    const clearBtn = document.getElementById('clearBtn');
    const filterButtons = document.querySelectorAll('.filter-btn');
    const searchInput = document.getElementById('search');
    const prioritySelect = document.getElementById('priority');

    let tasks = JSON.parse(localStorage.getItem('tasks')) || [];
    let currentFilter = 'all';

    function saveTasks() {
      localStorage.setItem('tasks', JSON.stringify(tasks));
    }

    function updateCounts() {
      const completed = tasks.filter(task => task.completed).length;
      completedCount.textContent = completed;
      pendingCount.textContent = tasks.length - completed;
    }

    function renderTasks() {
      taskList.innerHTML = '';

      const searchValue = searchInput.value.toLowerCase();

      const filteredTasks = tasks.filter(task => {
        const matchesSearch = task.text.toLowerCase().includes(searchValue);

        if(currentFilter === 'completed') {
          return task.completed && matchesSearch;
        }

        if(currentFilter === 'pending') {
          return !task.completed && matchesSearch;
        }

        return matchesSearch;
      });

      filteredTasks.forEach(task => {
        const div = document.createElement('div');
        div.className = `task ${task.completed ? 'completed' : ''}`;

        div.innerHTML = `
          <div class="task-left">
            <div class="check-btn"></div>

            <div class="task-info">
              <h3 class="task-text">${task.text}</h3>

              <div class="task-tags">
                <span class="tag ${task.priority.toLowerCase()}">${task.priority}</span>
                <span class="tag">📅 ${task.date}</span>
              </div>
            </div>
          </div>

          <button class="delete-btn">🗑</button>
        `;

        div.querySelector('.check-btn').addEventListener('click', () => {
          task.completed = !task.completed;
          saveTasks();
          renderTasks();
          updateCounts();
        });

        div.querySelector('.delete-btn').addEventListener('click', () => {
          div.style.transform = 'translateX(120px)';
          div.style.opacity = '0';

          setTimeout(() => {
            tasks = tasks.filter(t => t.id !== task.id);
            saveTasks();
            renderTasks();
            updateCounts();
          }, 300);
        });

        taskList.appendChild(div);
      });
    }

    addBtn.addEventListener('click', addTask);

    taskInput.addEventListener('keypress', (e) => {
      if(e.key === 'Enter') {
        addTask();
      }
    });

    function addTask() {
      const text = taskInput.value.trim();

      if(!text) return;

      tasks.unshift({
        id: Date.now(),
        text,
        completed: false,
        priority: prioritySelect.value,
        date: new Date().toLocaleDateString()
      });

      taskInput.value = '';

      saveTasks();
      renderTasks();
      updateCounts();
    }

    clearBtn.addEventListener('click', () => {
      tasks = tasks.filter(task => !task.completed);
      saveTasks();
      renderTasks();
      updateCounts();
    });

    filterButtons.forEach(button => {
      button.addEventListener('click', () => {
        filterButtons.forEach(btn => btn.classList.remove('active'));
        button.classList.add('active');

        currentFilter = button.dataset.filter;
        renderTasks();
      });
    });

    searchInput.addEventListener('input', renderTasks);

    renderTasks();
    updateCounts();
  </script>
</body>
</html>
